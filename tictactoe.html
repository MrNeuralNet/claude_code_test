<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
    }

    .score-box .label { font-size: 0.75rem; letter-spacing: 2px; opacity: 0.6; margin-bottom: 4px; }
    .score-box .val   { font-size: 1.8rem; font-weight: bold; }
    .score-box.x .val { color: #e94560; }
    .score-box.o .val { color: #a8dadc; }
    .score-box.draw .val { color: #aaa; }

    #mode-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #e94560;
    }

    #mode-toggle button {
      padding: 0.5rem 1.4rem;
      background: transparent;
      color: #e94560;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
    }

    #mode-toggle button.active {
      background: #e94560;
      color: #fff;
    }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #restart:hover { background: #c73652; }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div id="mode-toggle">
    <button id="btn-human" class="active" onclick="setMode('human')">VS HUMAN</button>
    <button id="btn-ai" onclick="setMode('ai')">VS COMPUTER</button>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scoreboard">
    <div class="score-box x">
      <div class="label">X WINS</div>
      <div class="val" id="score-x">0</div>
    </div>
    <div class="score-box draw">
      <div class="label">DRAWS</div>
      <div class="val" id="score-d">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O WINS</div>
      <div class="val" id="score-o">0</div>
    </div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, over, scores = {X:0, O:0, D:0};
    let mode = 'human'; // 'human' | 'ai'

    const cells  = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreD = document.getElementById('score-d');

    function setMode(m) {
      mode = m;
      document.getElementById('btn-human').classList.toggle('active', m === 'human');
      document.getElementById('btn-ai').classList.toggle('active', m === 'ai');
      init();
    }

    function init() {
      board   = Array(9).fill(null);
      current = 'X';
      over    = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = mode === 'ai' ? "Your turn (X)" : "X's turn";
    }

    function checkWin(b) {
      for (const [a, i, c] of WINS) {
        if (b[a] && b[a] === b[i] && b[a] === b[c]) return [a, i, c];
      }
      return null;
    }

    // Minimax — AI plays as O, human plays as X
    function minimax(b, isMax) {
      const win = checkWin(b);
      if (win) return isMax ? -10 : 10;
      if (b.every(Boolean)) return 0;

      let best = isMax ? -Infinity : Infinity;
      for (let i = 0; i < 9; i++) {
        if (b[i]) continue;
        b[i] = isMax ? 'O' : 'X';
        const score = minimax(b, !isMax);
        b[i] = null;
        best = isMax ? Math.max(best, score) : Math.min(best, score);
      }
      return best;
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (board[i]) continue;
        board[i] = 'O';
        const score = minimax(board, false);
        board[i] = null;
        if (score > best) { best = score; move = i; }
      }
      return move;
    }

    function applyMove(i) {
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const win = checkWin(board);
      if (win) {
        win.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = mode === 'ai'
          ? (current === 'X' ? 'You win!' : 'Computer wins!')
          : `${current} wins!`;
        scores[current]++;
        updateScores();
        over = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.D++;
        updateScores();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        if (mode === 'ai') {
          status.textContent = current === 'X' ? "Your turn (X)" : "Computer thinking…";
          if (current === 'O') setTimeout(aiMove, 350);
        } else {
          status.textContent = `${current}'s turn`;
        }
      }
    }

    function aiMove() {
      if (over) return;
      applyMove(bestMove());
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;
        if (mode === 'ai' && current === 'O') return; // block clicks during AI turn
        applyMove(i);
      });
    });

    function updateScores() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreD.textContent = scores.D;
    }

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
